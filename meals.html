<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dawat · Meals</title>
    <script>if(window.location.hostname==="igotdawat.github.io"){const p=window.location.pathname,s=window.location.search,h=window.location.hash;window.location.href=`https://igotdawat.vercel.app${p}${s}${h}`;}</script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&display=swap" />
    <link rel="stylesheet" href="./css/style.css" />
    <meta name="view-transition" content="same-origin" />
  </head>
  <body class="admin-page">
    <div class="lights">
      <span class="bulb c1"></span><span class="bulb c2"></span><span class="bulb c3"></span><span class="bulb c4"></span><span class="bulb c5"></span>
      <span class="bulb c1"></span><span class="bulb c2"></span><span class="bulb c3"></span><span class="bulb c4"></span><span class="bulb c5"></span>
      <span class="bulb c1"></span><span class="bulb c2"></span><span class="bulb c3"></span><span class="bulb c4"></span><span class="bulb c5"></span>
    </div>

    <div class="top-fixed">
      <div class="brand">DAWAT</div>
      <div class="tagline">★ আপনার নিমন্ত্রণ ★</div>
    </div>

    <h1>Meals</h1>
    <p id="meals-subtitle">Loading<span class="loading-dots"><span></span><span></span><span></span></span></p>

    <div class="admin-view" id="meals-view" hidden>
      <div class="admin-toolbar">
        <div class="admin-who">Signed in as <span id="admin-who-email">—</span></div>
        <div class="toolbar-actions">
          <button type="button" id="signout-btn" class="ghost-btn">Sign out</button>
        </div>
      </div>

      <nav class="admin-nav">
        <a href="applications">Applications</a>
        <a href="users">Users</a>
        <a href="meals" class="is-active">Meals</a>
        <a href="menu-admin">Menu</a>
        <a href="orders-admin">Orders</a>
        <a href="topups-admin">Top-ups</a>
        <a href="settings-admin">Settings</a>
      </nav>

      <div class="form-wrap">
        <h2 class="section-title">Add a meal</h2>
        <form id="meal-form" novalidate>
          <label for="meal-name">Name</label>
          <input id="meal-name" name="name" type="text" placeholder="Chicken Biriyani" required />

          <label for="meal-desc">Description (optional)</label>
          <input id="meal-desc" name="description" type="text" placeholder="Served with basmati rice" />

          <label for="meal-price">Price (Tk)</label>
          <input id="meal-price" name="price" type="number" min="0" step="1" placeholder="140" required />

          <button type="submit">▶ Save meal</button>
          <p id="meal-msg" class="form-msg" hidden></p>
        </form>
      </div>

      <div id="meals-list" class="apps-list" style="margin-top: 24px;" aria-live="polite">
        <p class="apps-empty">Loading<span class="loading-dots"><span></span><span></span><span></span></span></p>
      </div>
    </div>

    <script type="module">
      import { auth, db } from "./js/firebase.js";
      import {
        onAuthStateChanged, signOut
      } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
      import {
        collection, addDoc, deleteDoc, updateDoc, doc, onSnapshot,
        query, orderBy, serverTimestamp, getDoc, getDocs
      } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
      import { formatTk } from "./js/app-utils.js";
      import { mountNotificationBell } from "./js/notifications.js";
      import { confirmDialog, alertDialog } from "./js/modal.js";
      import { show404 } from "./js/app-utils.js";
      import { ADMIN_EMAILS } from "./js/admin-config.js";
      import { escape } from "./js/admin-helpers.js";

      const subtitle  = document.getElementById("meals-subtitle");
      const view      = document.getElementById("meals-view");
      const whoEmail  = document.getElementById("admin-who-email");
      const signoutBtn= document.getElementById("signout-btn");
      const form      = document.getElementById("meal-form");
      const msg       = document.getElementById("meal-msg");
      const listEl    = document.getElementById("meals-list");
      const MEALS_PER_PAGE = 10;
      let mealsPage = 0;
      let allMeals = [];
      const WEEKDAY_KEYS = ["sat", "sun", "mon", "tue", "wed", "thu", "fri"];

      signoutBtn.addEventListener("click", async () => {
        await signOut(auth);
        window.location.href = "/";
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        msg.hidden = true; msg.classList.remove("is-ok", "is-err");
        const submitBtn = form.querySelector("button[type=submit]");
        submitBtn.disabled = true;
        try {
          const data = new FormData(form);
          const name = String(data.get("name") || "").trim();
          const priceInput = String(data.get("price") || "").trim();

          // Validation: name is required
          if (!name) {
            msg.textContent = "Please enter a meal name.";
            msg.classList.add("is-err"); msg.hidden = false;
            submitBtn.disabled = false;
            return;
          }

          // Validation: price is required and must be >= 0
          if (!priceInput || isNaN(priceInput) || Number(priceInput) < 0) {
            msg.textContent = "Please set a valid price.";
            msg.classList.add("is-err"); msg.hidden = false;
            submitBtn.disabled = false;
            return;
          }

          await addDoc(collection(db, "meals"), {
            name:        name,
            description: String(data.get("description") || "").trim(),
            price:       Number(priceInput),
            createdAt:   serverTimestamp(),
            createdBy:   auth.currentUser ? auth.currentUser.email : null
          });
          form.reset();
          msg.textContent = "✓ Saved.";
          msg.classList.add("is-ok"); msg.hidden = false;
        } catch (err) {
          console.error(err);
          msg.textContent = "Could not save meal.";
          msg.classList.add("is-err"); msg.hidden = false;
        } finally {
          submitBtn.disabled = false;
        }
      });

      function renderMeals(items) {
        allMeals = items;
        if (!items.length) {
          listEl.innerHTML = '<p class="apps-empty">No meals yet. Add one above.</p>';
          return;
        }
        const totalPages = Math.max(1, Math.ceil(items.length / MEALS_PER_PAGE));
        if (mealsPage >= totalPages) mealsPage = totalPages - 1;
        if (mealsPage < 0) mealsPage = 0;
        const start = mealsPage * MEALS_PER_PAGE;
        const pageItems = items.slice(start, start + MEALS_PER_PAGE);
        const cardsHTML = pageItems.map((m) => `
          <article class="meal-row" data-id="${m.id}">
            <div class="meal-row-main">
              <h3 class="meal-row-name">${escape(m.name)}</h3>
              ${m.description ? `<p class="meal-desc">${escape(m.description)}</p>` : ""}
            </div>
            <span class="meal-price">${formatTk(m.price)}</span>
            <button type="button" class="icon-btn icon-btn-danger" data-action="delete" aria-label="Delete meal" title="Delete meal">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            </button>
          </article>
        `).join("");
        const pager = items.length > MEALS_PER_PAGE
          ? `<div class="wallet-pager">
              <button type="button" class="ghost-btn" data-pager="prev"${mealsPage === 0 ? " disabled" : ""}>◀ Prev</button>
              <span>Page ${mealsPage + 1} / ${totalPages}</span>
              <button type="button" class="ghost-btn" data-pager="next"${mealsPage >= totalPages - 1 ? " disabled" : ""}>Next ▶</button>
            </div>`
          : "";
        listEl.innerHTML = cardsHTML + pager;
      }

      listEl.addEventListener("click", async (e) => {
        const pagerBtn = e.target.closest("[data-pager]");
        if (pagerBtn) {
          if (pagerBtn.dataset.pager === "prev") mealsPage = Math.max(0, mealsPage - 1);
          else mealsPage += 1;
          renderMeals(allMeals);
          return;
        }
        const delBtn = e.target.closest('[data-action="delete"]');
        if (delBtn) {
          const card = delBtn.closest(".meal-row");
          if (!card) return;
          const ok = await confirmDialog({
            title: "Delete meal",
            message: "Delete this meal?\n\nIt will also be removed from the weekly menu.",
            confirmLabel: "Delete",
            danger: true
          });
          if (!ok) return;
          delBtn.disabled = true;
          try {
            // Delete the meal
            await deleteDoc(doc(db, "meals", card.dataset.id));

            // Clean up weeklyMenu: remove references to this meal from each weekday
            const wkRef = doc(db, "weeklyMenu", "main");
            const wkSnap = await getDoc(wkRef);
            if (wkSnap.exists()) {
              const data = wkSnap.data() || {};
              let changed = false;
              const updates = {};
              WEEKDAY_KEYS.forEach((key) => {
                const before = Array.isArray(data[key]) ? data[key] : [];
                const after = before.filter((id) => id !== card.dataset.id);
                updates[key] = after;
                if (after.length !== before.length) changed = true;
              });
              const anyLeft = Object.values(updates).some((a) => a && a.length);
              if (!anyLeft) {
                await deleteDoc(wkRef);
              } else if (changed) {
                await updateDoc(wkRef, updates);
              }
            }

            // If no meals remain at all, ensure weeklyMenu is removed
            const mealsSnap = await getDocs(collection(db, "meals"));
            if (mealsSnap.empty) {
              try { await deleteDoc(doc(db, "weeklyMenu", "main")); } catch (e) { /* ignore */ }
            }
          } catch (err) {
            console.error(err);
            delBtn.disabled = false;
            alertDialog({ title: "Error", message: "Could not delete." });
          }
        }
      });

      onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.replace("/"); return; }
        if (!ADMIN_EMAILS.includes((user.email || "").toLowerCase())) {
          await show404(); return;
        }
        whoEmail.textContent = user.email;
        subtitle.textContent = "Manage the meal catalog.";
        view.hidden = false;
        mountNotificationBell({ user });

        onSnapshot(
          query(collection(db, "meals"), orderBy("name")),
          (snap) => {
            const items = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
            renderMeals(items);
          },
          (err) => {
            console.error(err);
            listEl.innerHTML = '<p class="apps-empty is-err">Could not load meals.</p>';
          }
        );
      });
    </script>
  </body>
</html>
