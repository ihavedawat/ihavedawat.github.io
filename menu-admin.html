<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dawat · Weekly Menu</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&display=swap" />
    <link rel="stylesheet" href="style.css" />
    <meta name="view-transition" content="same-origin" />
  </head>
  <body class="admin-page">
    <div class="lights">
      <span class="bulb c1"></span><span class="bulb c2"></span><span class="bulb c3"></span><span class="bulb c4"></span><span class="bulb c5"></span>
      <span class="bulb c1"></span><span class="bulb c2"></span><span class="bulb c3"></span><span class="bulb c4"></span><span class="bulb c5"></span>
      <span class="bulb c1"></span><span class="bulb c2"></span><span class="bulb c3"></span><span class="bulb c4"></span><span class="bulb c5"></span>
    </div>

    <div class="top-fixed">
      <div class="brand">DAWAT</div>
      <div class="tagline">★ আপনার নিমন্ত্রণ ★</div>
    </div>

    <h1>Weekly Menu</h1>
    <p id="menu-subtitle">Loading<span class="loading-dots"><span></span><span></span><span></span></span></p>

    <div class="admin-view" id="menu-view" hidden>
      <div class="admin-toolbar">
        <div class="admin-who">Signed in as <span id="admin-who-email">—</span></div>
        <div class="toolbar-actions">
          <button type="button" id="signout-btn" class="ghost-btn">Sign out</button>
        </div>
      </div>

      <nav class="admin-nav">
        <a href="applications">Applications</a>
        <a href="users">Users</a>
        <a href="meals">Meals</a>
        <a href="menu-admin" class="is-active">Menu</a>
        <a href="orders-admin">Orders</a>
        <a href="topups-admin">Top-ups</a>
        <a href="settings-admin">Settings</a>
      </nav>

      <p class="help-text" hidden>
        Tick the meals available on each weekday. This repeats every week. Customers can order until <strong>10 PM the night before</strong>.
      </p>

      <div id="menu-days" class="menu-days"></div>

      <div class="save-bar" id="save-bar" hidden>
        <span id="menu-msg" class="form-msg" hidden></span>
        <button type="button" id="save-all">▶ Save weekly menu</button>
      </div>
    </div>

    <script type="module">
      import { auth, db } from "./firebase.js";
      import {
        onAuthStateChanged, signOut
      } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
      import {
        collection, getDocs, getDoc, setDoc, doc, query, orderBy, serverTimestamp, onSnapshot
      } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
      import { WEEKDAY_ORDER, WEEKDAY_LABELS, formatTk } from "./app-utils.js";
      import { mountNotificationBell } from "./notifications.js";
      import { show404 } from "./app-utils.js";
      import { ADMIN_EMAILS } from "./admin-config.js";

      const subtitle = document.getElementById("menu-subtitle");
      const view     = document.getElementById("menu-view");
      const whoEmail = document.getElementById("admin-who-email");
      const signoutBtn = document.getElementById("signout-btn");
      const daysEl   = document.getElementById("menu-days");
      const saveBar  = document.getElementById("save-bar");
      const saveBtn  = document.getElementById("save-all");
      const msgEl    = document.getElementById("menu-msg");
      const helpText = document.querySelector('.help-text');

      function escape(s) {
        return String(s ?? "").replace(/[&<>"']/g, (c) => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
        })[c]);
      }

      signoutBtn.addEventListener("click", async () => {
        await signOut(auth);
        window.location.href = "/";
      });

      let meals = [];
      let weekly = {};   // { sat: [mealIds], sun: [...], ... }

      async function loadAll() {
        // Pull meal catalog.
        const mealsSnap = await getDocs(query(collection(db, "meals"), orderBy("name")));
        meals = mealsSnap.docs.map((d) => ({ id: d.id, ...d.data() }));

        // Pull the single weekly menu doc.
        const wkSnap = await getDoc(doc(db, "weeklyMenu", "main"));
        weekly = wkSnap.exists() ? (wkSnap.data() || {}) : {};

        if (!meals.length) {
          helpText.hidden = true;
          saveBar.hidden = true;
          daysEl.innerHTML = '<p class="apps-empty">No meals yet. Add some on the Meals page first.</p>';
          return;
        }

        helpText.hidden = false;
        saveBar.hidden = false;

        daysEl.innerHTML = WEEKDAY_ORDER.map((key) => {
          const picked = new Set(weekly[key] || []);
          const mealsHtml = meals.map((m) => `
            <label class="menu-pick pixel-check">
              <input type="checkbox" data-meal-id="${m.id}" ${picked.has(m.id) ? "checked" : ""} />
              <span class="menu-pick-name">${escape(m.name)}</span>
              <span class="menu-pick-price">${formatTk(m.price)}</span>
            </label>
          `).join("");
          return `
            <section class="menu-day" data-day-key="${key}">
              <header class="menu-day-head">
                <h3>${WEEKDAY_LABELS[key]}</h3>
              </header>
              <div class="menu-picks">${mealsHtml}</div>
            </section>
          `;
        }).join("");
        saveBar.hidden = false;
      }

      saveBtn.addEventListener("click", async () => {
        msgEl.hidden = true; msgEl.classList.remove("is-ok", "is-err");
        saveBtn.disabled = true;
        try {
          const payload = {};
          WEEKDAY_ORDER.forEach((key) => {
            const sec = daysEl.querySelector(`.menu-day[data-day-key="${key}"]`);
            if (!sec) { payload[key] = []; return; }
            payload[key] = Array.from(sec.querySelectorAll('input[type="checkbox"]:checked'))
              .map((i) => i.dataset.mealId);
          });
          await setDoc(doc(db, "weeklyMenu", "main"), {
            ...payload,
            updatedAt: serverTimestamp(),
            updatedBy: auth.currentUser ? auth.currentUser.email : null
          }, { merge: true });
          msgEl.textContent = "✓ Saved";
          msgEl.classList.add("is-ok"); msgEl.hidden = false;
        } catch (err) {
          console.error(err);
          msgEl.textContent = "Could not save.";
          msgEl.classList.add("is-err"); msgEl.hidden = false;
        } finally {
          saveBtn.disabled = false;
        }
      });

      onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.replace("/"); return; }
        if (!ADMIN_EMAILS.includes((user.email || "").toLowerCase())) {
          await show404(); return;
        }
        whoEmail.textContent = user.email;
        subtitle.textContent = "Set the meals offered each weekday.";
        view.hidden = false;
        mountNotificationBell({ user });
        try {
          await loadAll();
        } catch (err) {
          console.error(err);
          daysEl.innerHTML = '<p class="apps-empty is-err">Could not load menu data.</p>';
        }

        // Keep the menu UI in sync with meals in real-time. If meals become empty,
        // hide the help text and save bar immediately.
        onSnapshot(query(collection(db, "meals"), orderBy("name")), async () => {
          try {
            await loadAll();
          } catch (err) {
            console.error("reload error", err);
          }
        }, (err) => { console.error(err); });
      });
    </script>
  </body>
</html>
