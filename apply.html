<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dawat · Apply for an Account</title>
    <!-- Pixel fonts from Google:
         - Press Start 2P : chunky 8-bit, used for the wordmark
         - Pixelify Sans  : a cleaner, more readable pixel font for headings
         - VT323          : terminal-style pixel, used for body text + inputs
         - Jacquard 12    : gothic pixel display (optional, swap-in for the wordmark) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&display=swap" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <!-- Starfield container: spans the viewport. The mask on this div
         makes the stars (rendered as box-shadows on the 1px children)
         densest in the center and fade out at the edges. -->
    <div class="starfield" aria-hidden="true">
      <span class="star-layer s-small"></span>
      <span class="star-layer s-big"></span>
    </div>

    <!-- Shooting stars: 3 streaks at different angles/positions/delays so
         they appear at unpredictable moments instead of regular intervals. -->
    <div class="shooting-stars" aria-hidden="true">
      <span class="shoot s1"></span>
      <span class="shoot s2"></span>
      <span class="shoot s3"></span>
    </div>
    <!-- ===== Top string of morichbati =====
         Each <span class="bulb"> is one lightbulb. We give them different
         colors and animation delays so they twinkle out of sync, like a
         real string of wedding lights. -->
    <div class="lights">
      <span class="bulb c1"></span>
      <span class="bulb c2"></span>
      <span class="bulb c3"></span>
      <span class="bulb c4"></span>
      <span class="bulb c5"></span>
      <span class="bulb c1"></span>
      <span class="bulb c2"></span>
      <span class="bulb c3"></span>
      <span class="bulb c4"></span>
      <span class="bulb c5"></span>
      <span class="bulb c1"></span>
      <span class="bulb c2"></span>
      <span class="bulb c3"></span>
      <span class="bulb c4"></span>
      <span class="bulb c5"></span>
    </div>

    <!-- Only the lights, brand, and tagline stay pinned to the viewport. -->
    <div class="top-fixed">
      <div class="brand">DAWAT</div>
      <div class="tagline">★ আপনার নিমন্ত্রণ ★</div>
    </div>

    <h1>Apply for an Account</h1>
    <p>We serve only those we invite.</p>

    <!-- The form wrapper carries a second string of lights around it. -->
    <div class="form-wrap">
      <form id="apply-form">
        <label for="name">Full name</label>
        <input id="name" type="text" placeholder="MD. Monjurul Islam Shakil" autofocus required />

        <label for="mobile">Mobile number</label>
        <input id="mobile" type="tel" placeholder="01XXXXXXXXX" required
               inputmode="numeric" pattern="01[0-9]{9}" maxlength="11"
               title="11-digit Bangladeshi mobile number starting with 01" />

        <label for="email">Email</label>
        <input id="email" type="email" placeholder="notshakil@gmail.com" required />

        <label for="office">Office name</label>
        <input id="office" type="text" placeholder="b2qa" required />

        <label for="address">Full office address</label>
        <input id="address" type="text" placeholder="House 67 (Floor 1), Road 27, Gulshan 1, Dhaka" required />

        <button type="submit">▶ Submit Application</button>
        <!-- Status message shown after submit (success or error). -->
        <div id="apply-status" class="apply-status" role="status" aria-live="polite"></div>
        <p class="form-foot">
          Already approved? <a href="/">Sign in</a>.
        </p>
      </form>
    </div>

    <!-- ===== Randomize the starfield on every page load =====
         Shared starfield script — see stars.js for details. -->
    <script src="../js/stars.js"></script>

    <!-- ===== Firestore wiring =====
         ES module: imports the shared `db` from firebase.js and writes
         each submitted application as a new doc in the `applications`
         collection with status: "pending". Admin reviews these later. -->
    <script type="module">
      import { db, auth } from "./js/firebase.js";
      import {
        collection,
        addDoc,
        getDocs,
        query,
        where,
        serverTimestamp
      } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
      import {
        onAuthStateChanged
      } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
      import { ADMIN_EMAILS } from "./js/admin-config.js";

      // If someone is already signed in, they shouldn't see the apply page.
      // Admin → admin console. Approved customer → dashboard.
      onAuthStateChanged(auth, (user) => {
        if (!user) return;
        if (ADMIN_EMAILS.includes((user.email || "").toLowerCase())) {
          window.location.replace("applications");
        } else {
          window.location.replace("menu");
        }
      });

      const form   = document.getElementById("apply-form");
      const status = document.getElementById("apply-status");
      const button = form.querySelector("button[type=submit]");

      // Strip anything that isn't a digit as the user types in the mobile
      // field. type="tel" alone does NOT restrict input — it only hints
      // mobile keyboards. pattern= validates on submit; this gives instant
      // feedback by deleting bad characters before they're seen.
      const mobileInput = document.getElementById("mobile");
      mobileInput.addEventListener("input", () => {
        const cleaned = mobileInput.value.replace(/\D+/g, "").slice(0, 11);
        if (cleaned !== mobileInput.value) mobileInput.value = cleaned;
      });

      // Check if an application with this email OR mobile already exists
      // in a pending or approved state. Rejected ones are allowed to
      // re-apply. Returns { blocked: bool, reason: string }.
      async function checkDuplicate(email, mobile) {
        const apps = collection(db, "applications");
        const [byEmail, byMobile] = await Promise.all([
          getDocs(query(apps, where("email",  "==", email))),
          getDocs(query(apps, where("mobile", "==", mobile)))
        ]);
        const all = [...byEmail.docs, ...byMobile.docs].map((d) => d.data());
        // Banned users get the same message as already-approved — we don't
        // tell them they're banned, we just refuse the application quietly.
        const banned = all.find((a) => a.status === "banned");
        if (banned) {
          return { blocked: true,
            reason: "You already have an account. Please sign in instead." };
        }
        const approved = all.find((a) => a.status === "approved");
        if (approved) {
          return { blocked: true,
            reason: "You already have an account. Please sign in instead." };
        }
        const pending = all.find((a) => a.status === "pending");
        if (pending) {
          return { blocked: true,
            reason: "An application with this email or mobile is already being reviewed." };
        }
        const rejected = all.find((a) => a.status === "rejected");
        if (rejected) {
          return { blocked: true,
            reason: "A previous application with this email or mobile was not approved." };
        }
        return { blocked: false };
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        status.textContent = "";
        status.className = "apply-status";
        button.disabled = true;
        button.innerHTML = '▶ Sending<span class="loading-dots"><span></span><span></span><span></span></span>';

        const name    = document.getElementById("name").value.trim();
        const mobile  = document.getElementById("mobile").value.trim();
        const email   = document.getElementById("email").value.trim().toLowerCase();
        const office  = document.getElementById("office").value.trim();
        const address = document.getElementById("address").value.trim();

        try {
          const dup = await checkDuplicate(email, mobile);
          if (dup.blocked) {
            status.textContent = "⚠ " + dup.reason;
            status.classList.add("is-error");
            return;
          }
          await addDoc(collection(db, "applications"), {
            name, mobile, email, office, address,
            status:    "pending",
            createdAt: serverTimestamp()
          });
          fetch("/api/notifyNewApplication", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              message: "New application\nBy: " + name + " (" + email + ")\nMobile: " + mobile
            })
          }).catch((e) => console.error("notify admin:", e));
          form.reset();
          status.textContent =
            "✨ Application received. You will receive your credentials soon.";
          status.classList.add("is-success");
        } catch (err) {
          console.error(err);
          status.textContent =
            "⚠ Could not submit. Check your connection and try again.";
          status.classList.add("is-error");
        } finally {
          button.disabled = false;
          button.textContent = "▶ Submit Application";
        }
      });
    </script>
  </body>
</html>
