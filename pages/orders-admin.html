<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dawat · Orders</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&display=swap" />
    <link rel="stylesheet" href="../css/style.css" />
    <meta name="view-transition" content="same-origin" />
  </head>
  <body class="admin-page">
    <div class="lights">
      <span class="bulb c1"></span><span class="bulb c2"></span><span class="bulb c3"></span><span class="bulb c4"></span><span class="bulb c5"></span>
      <span class="bulb c1"></span><span class="bulb c2"></span><span class="bulb c3"></span><span class="bulb c4"></span><span class="bulb c5"></span>
      <span class="bulb c1"></span><span class="bulb c2"></span><span class="bulb c3"></span><span class="bulb c4"></span><span class="bulb c5"></span>
    </div>

    <div class="top-fixed">
      <div class="brand">DAWAT</div>
      <div class="tagline">★ আপনার নিমন্ত্রণ ★</div>
    </div>

    <h1>Orders</h1>
    <p id="orders-subtitle">Loading<span class="loading-dots"><span></span><span></span><span></span></span></p>

    <div class="admin-view" id="orders-view" hidden>
      <div class="admin-toolbar">
        <div class="admin-who">Signed in as <span id="admin-who-email">—</span></div>
        <div class="toolbar-actions">
          <button type="button" id="signout-btn" class="ghost-btn">Sign out</button>
        </div>
      </div>

      <nav class="admin-nav">
        <a href="applications">Applications</a>
        <a href="users">Users</a>
        <a href="meals">Meals</a>
        <a href="menu-admin">Menu</a>
        <a href="orders-admin" class="is-active">Orders</a>
        <a href="topups-admin">Top-ups</a>
        <a href="settings-admin">Settings</a>
      </nav>

      <div id="orders-list" class="apps-list" aria-live="polite">
        <p class="apps-empty">Loading<span class="loading-dots"><span></span><span></span><span></span></span></p>
      </div>
    </div>

    <script type="module">
      import { auth, db } from "./firebase.js";
      import {
        onAuthStateChanged, signOut
      } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
      import {
        collection, onSnapshot, query, orderBy, getDocs
      } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
      import { formatTk, formatDateLabel, toDateKey, startOfToday, getActiveOrderDateKey } from "./app-utils.js";
      import { mountNotificationBell } from "./notifications.js";
      import { show404 } from "./app-utils.js";
      import { ADMIN_EMAILS } from "./admin-config.js";
      import { escape } from "./admin-helpers.js";

      const subtitle = document.getElementById("orders-subtitle");
      const view     = document.getElementById("orders-view");
      const whoEmail = document.getElementById("admin-who-email");
      const signoutBtn = document.getElementById("signout-btn");
      const listEl   = document.getElementById("orders-list");

      let customerInfo  = {}; // { email: { name, office, address } }
      let activeEmails  = new Set();
      let blockedEmails = new Set();
      let lastOrders    = [];
      const DATES_PER_PAGE = 10;
      let datesPage = 0;

      function normalizeOfficeName(office) {
        return String(office || "").toLowerCase().replace(/\s+/g, "");
      }
      function dateFromKey(key) {
        const [y, m, d] = key.split("-").map(Number);
        return new Date(y, m - 1, d);
      }
      function formatBracketDate(key) {
        const d = dateFromKey(key);
        const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
      }
      function custLabel(email) {
        const info = customerInfo[(email || "").toLowerCase()];
        const name = info ? info.name : "";
        return name ? `${escape(name)} <span class="muted">· ${escape(email)}</span>` : escape(email);
      }

      signoutBtn.addEventListener("click", async () => {
        await signOut(auth);
        window.location.href = "/";
      });

      function render(orders) {
        lastOrders = orders;
        const live      = orders.filter((o) => o.status !== "cancelled");
        const cancelled = orders.filter((o) => o.status === "cancelled");
        if (!live.length && !cancelled.length) {
          listEl.innerHTML = '<p class="apps-empty">No orders.</p>';
          return;
        }

        // Group by date, then by office (normalized), then by meal
        const byDate = {};
        const officeDisplayNames = {}; // Track first original office name for each normalized key

        for (const o of live) {
          const key = o.forDate;
          if (!byDate[key]) byDate[key] = {};
          const info = customerInfo[(o.userEmail || "").toLowerCase()] || {};
          const office = info.office || "—";
          const normalizedOffice = normalizeOfficeName(office);
          if (!byDate[key][normalizedOffice]) byDate[key][normalizedOffice] = [];
          byDate[key][normalizedOffice].push(o);
          if (!officeDisplayNames[normalizedOffice]) officeDisplayNames[normalizedOffice] = office;
        }

        const cancelledByDate = {};
        for (const o of cancelled) {
          const key = o.forDate;
          if (!cancelledByDate[key]) cancelledByDate[key] = {};
          const info = customerInfo[(o.userEmail || "").toLowerCase()] || {};
          const office = info.office || "—";
          const normalizedOffice = normalizeOfficeName(office);
          if (!cancelledByDate[key][normalizedOffice]) cancelledByDate[key][normalizedOffice] = [];
          cancelledByDate[key][normalizedOffice].push(o);
          if (!officeDisplayNames[normalizedOffice]) officeDisplayNames[normalizedOffice] = office;
        }

        const activeKey = getActiveOrderDateKey();
        const allKeys = Array.from(new Set([...Object.keys(byDate), ...Object.keys(cancelledByDate)])).sort().reverse();
        const totalPages = Math.max(1, Math.ceil(allKeys.length / DATES_PER_PAGE));
        if (datesPage >= totalPages) datesPage = totalPages - 1;
        if (datesPage < 0) datesPage = 0;
        const pageStart = datesPage * DATES_PER_PAGE;
        const pageKeys = allKeys.slice(pageStart, pageStart + DATES_PER_PAGE);

        const cardsHTML = pageKeys.map((key) => {
          const datesByOffice = byDate[key] || {};
          const cancelledDatesByOffice = cancelledByDate[key] || {};
          const allOffices = Array.from(new Set([...Object.keys(datesByOffice), ...Object.keys(cancelledDatesByOffice)])).sort();

          // Calculate totals for this date (across all offices)
          let grandTotal = 0;
          let totalMeals = 0;
          let totalCustomers = 0;
          const customerEmails = new Set();

          for (const normalizedOffice of allOffices) {
            const items = datesByOffice[normalizedOffice] || [];
            for (const o of items) {
              grandTotal += Number(o.total || 0);
              customerEmails.add((o.userEmail || "").toLowerCase());
              for (const it of (o.items || [])) {
                totalMeals += Number(it.qty || 0);
              }
            }
          }
          totalCustomers = customerEmails.size;

          // Build office sections within this date
          const officeCardsHTML = allOffices.map((normalizedOffice) => {
            const displayOffice = officeDisplayNames[normalizedOffice];
            const items = datesByOffice[normalizedOffice] || [];
            const cItems = cancelledDatesByOffice[normalizedOffice] || [];

            // Group by meal
            const byMeal = {};
            let officeGrand = 0;
            for (const o of items) {
              officeGrand += Number(o.total || 0);
              for (const it of (o.items || [])) {
                const k = it.name;
                if (!byMeal[k]) byMeal[k] = { qty: 0, price: it.price, customers: [] };
                byMeal[k].qty += Number(it.qty || 0);
                byMeal[k].customers.push({ email: o.userEmail, qty: Number(it.qty || 0) });
              }
            }

            const byMealCancelled = {};
            for (const o of cItems) {
              for (const it of (o.items || [])) {
                const k = it.name;
                if (!byMealCancelled[k]) byMealCancelled[k] = { qty: 0, customers: [] };
                byMealCancelled[k].qty += Number(it.qty || 0);
                byMealCancelled[k].customers.push({ email: o.userEmail, qty: Number(it.qty || 0) });
              }
            }

            const officeMealQty = Object.values(byMeal).reduce((s, g) => s + g.qty, 0);

            return `
              <div class="office-section" style="margin-bottom: 16px; border-left: 3px solid var(--accent); padding-left: 12px;">
                <h4 class="office-head" style="margin: 0 0 8px 0; font-size: 0.9em; font-weight: 600;">${escape(displayOffice)}</h4>
                <div class="office-summary">
                  ${Object.keys(byMeal).length ? `
                    <ul class="meal-groups">
                      ${Object.entries(byMeal).map(([name, g]) => `
                        <li class="meal-group">
                          <div class="meal-group-head">
                            <strong class="meal-group-name">${escape(name)}</strong>
                            <span class="meal-group-qty">× ${g.qty}</span>
                          </div>
                          <ul class="meal-group-customers">
                            ${g.customers.map((c) => `
                              <li>
                                <span class="cust-email">${custLabel(c.email)}</span>
                                <span class="cust-qty">× ${c.qty}</span>
                              </li>
                            `).join("")}
                          </ul>
                        </li>
                      `).join("")}
                    </ul>
                  ` : '<p class="muted" style="margin:0;">No active orders.</p>'}
                  ${cItems.length ? `
                    <details class="cancelled-details">
                      <summary>
                        <span class="orders-subhead">Cancelled</span>
                        <span class="status-chip is-rejected">${cItems.length}</span>
                      </summary>
                      <ul class="cancelled-list">
                        ${cItems.map((o) => `
                          <li>
                            <span class="cust-email">${custLabel(o.userEmail)}</span>
                            <span class="cust-qty">${(o.items || []).map((it) => `${escape(it.name)} × ${it.qty}`).join(", ")}</span>
                          </li>
                        `).join("")}
                      </ul>
                    </details>
                  ` : ''}
                </div>
              </div>
            `;
          }).join("");

          const stale = key !== activeKey;
          return `
            <article class="app-card ${stale ? "is-stale" : ""}">
              <header class="app-card-head">
                <h3 class="app-card-name">${formatDateLabel(dateFromKey(key))}</h3>
                <div class="card-head-right">
                  <span class="meal-price">${totalCustomers} customer${totalCustomers === 1 ? "" : "s"} · ${totalMeals} meal${totalMeals === 1 ? "" : "s"} · ${formatTk(grandTotal)}</span>
                </div>
              </header>
              <div class="orders-summary">
                ${officeCardsHTML}
              </div>
            </article>
          `;
        }).join("");

        const pager = allKeys.length > DATES_PER_PAGE
          ? `<div class="wallet-pager">
              <button type="button" class="ghost-btn" data-pager="prev"${datesPage === 0 ? " disabled" : ""}>◀ Prev</button>
              <span>Page ${datesPage + 1} / ${totalPages}</span>
              <button type="button" class="ghost-btn" data-pager="next"${datesPage >= totalPages - 1 ? " disabled" : ""}>Next ▶</button>
            </div>`
          : "";
        listEl.innerHTML = cardsHTML + pager;
      }

      listEl.addEventListener("click", (ev) => {
        const pagerBtn = ev.target.closest("[data-pager]");
        if (!pagerBtn) return;
        if (pagerBtn.dataset.pager === "prev") datesPage = Math.max(0, datesPage - 1);
        else datesPage += 1;
        render(lastOrders);
      });

      onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.replace("/"); return; }
        if (!ADMIN_EMAILS.includes((user.email || "").toLowerCase())) {
          await show404(); return;
        }
        whoEmail.textContent = user.email;
        subtitle.textContent = "Today and upcoming orders, grouped by date and office.";
        view.hidden = false;
        mountNotificationBell({ user });

        try {
          const snap = await getDocs(collection(db, "applications"));
          customerInfo = {};
          activeEmails = new Set();
          blockedEmails = new Set();
          snap.docs.forEach((d) => {
            const a = d.data();
            if (a && a.email) {
              const key = String(a.email).toLowerCase();
              customerInfo[key] = {
                name: a.name || "",
                office: a.office || "—",
                address: a.address || ""
              };
              // Block orders only for explicitly blocking statuses.
              // Missing doc / approved → allowed.
              if (a.status === "banned" || a.status === "rejected" || a.status === "pending") {
                blockedEmails.add(key);
              } else {
                activeEmails.add(key);
              }
            }
          });
        } catch (err) {
          console.error("Could not load applicant names", err);
        }

        onSnapshot(
          query(collection(db, "orders"), orderBy("forDate")),
          (snap) => {
            const items = snap.docs
              .map((d) => ({ id: d.id, ...d.data() }))
              .filter((o) => {
                const key = (o.userEmail || "").toLowerCase();
                // Hide if explicitly blocked OR if the application
                // record no longer exists (user was deleted / disabled).
                return !blockedEmails.has(key) && (key in customerInfo);
              });
            render(items);
          },
          (err) => {
            console.error(err);
            listEl.innerHTML = '<p class="apps-empty is-err">Could not load orders.</p>';
          }
        );
      });
    </script>
  </body>
</html>
