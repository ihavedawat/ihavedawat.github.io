<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dawat · Settings</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&display=swap" />
    <link rel="stylesheet" href="./css/style.css" />
    <meta name="view-transition" content="same-origin" />
  </head>
  <body class="admin-page">
    <div class="lights">
      <span class="bulb c1"></span><span class="bulb c2"></span><span class="bulb c3"></span><span class="bulb c4"></span><span class="bulb c5"></span>
      <span class="bulb c1"></span><span class="bulb c2"></span><span class="bulb c3"></span><span class="bulb c4"></span><span class="bulb c5"></span>
      <span class="bulb c1"></span><span class="bulb c2"></span><span class="bulb c3"></span><span class="bulb c4"></span><span class="bulb c5"></span>
    </div>

    <div class="top-fixed">
      <div class="brand">DAWAT</div>
      <div class="tagline">★ আপনার নিমন্ত্রণ ★</div>
    </div>

    <h1>Settings</h1>
    <p id="settings-subtitle">Loading<span class="loading-dots"><span></span><span></span><span></span></span></p>

    <div class="admin-view" id="settings-view" hidden>
      <div class="admin-toolbar">
        <div class="admin-who">
          Signed in as <span id="who-email">—</span>
        </div>
        <div class="toolbar-actions">
          <a id="back-link" href="menu.html" hidden></a>
          <button type="button" id="signout-btn" class="ghost-btn">Sign out</button>
        </div>
      </div>

      <nav class="admin-nav" id="settings-nav">
        <a href="menu.html">Menu</a>
        <a href="orders.html">My Orders</a>
        <a href="wallet.html">Wallet</a>
        <a href="settings.html" class="is-active">Settings</a>
      </nav>

      <p id="force-pw-banner" class="form-msg is-err" hidden style="text-align:center; margin: 12px 0 4px;">
        ⚠ Please set your own password before continuing.
      </p>

      <!-- ===== Change password ===== -->
      <div class="form-wrap" style="margin-top: 20px;">
        <h2 style="margin: 0 0 14px; font-family: 'Press Start 2P', monospace; font-size: 14px; color: var(--gold);">Change password</h2>
        <form id="pw-form" novalidate>
          <label for="pw-current">Current password</label>
          <div class="pw-input">
            <input id="pw-current" name="current" type="password" autocomplete="current-password" autofocus required />
            <button type="button" class="pw-btn pw-toggle" data-toggle="pw-current" tabindex="-1" aria-label="Show password" title="Show password">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>

          <label for="pw-next">New password (min 6 chars)</label>
          <div class="pw-input">
            <input id="pw-next" name="next" type="password" autocomplete="new-password" minlength="6" required />
            <button type="button" class="pw-btn pw-toggle" data-toggle="pw-next" tabindex="-1" aria-label="Show password" title="Show password">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>

          <label for="pw-confirm">Confirm new password</label>
          <div class="pw-input">
            <input id="pw-confirm" name="confirm" type="password" autocomplete="new-password" minlength="6" required />
            <button type="button" class="pw-btn pw-toggle" data-toggle="pw-confirm" tabindex="-1" aria-label="Show password" title="Show password">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>

          <button type="submit">▶ Update password</button>
          <p id="pw-msg" class="form-msg" hidden></p>
        </form>
      </div>

    </div>

    <script type="module">
      import { auth, db } from "./js/firebase.js";
      import {
        onAuthStateChanged,
        signOut,
        updatePassword,
        reauthenticateWithCredential,
        EmailAuthProvider
      } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
      import {
        collection, query, where, getDocs,
        doc, updateDoc
      } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
      import { mountNotificationBell } from "./js/notifications.js";
      import { ADMIN_EMAILS } from "./js/admin-config.js";

      const subtitle   = document.getElementById("settings-subtitle");
      const view       = document.getElementById("settings-view");
      const whoEmail   = document.getElementById("who-email");
      const signoutBtn = document.getElementById("signout-btn");
      const backLink   = document.getElementById("back-link");
      const forceBanner= document.getElementById("force-pw-banner");
      const pwForm     = document.getElementById("pw-form");

      // Show/hide toggles for all 3 password fields (same UX as login).
      const EYE_OPEN_SVG = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>';
      const EYE_OFF_SVG  = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a19.77 19.77 0 0 1 5.06-5.94M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 7 11 7a19.85 19.85 0 0 1-3.17 4.19M9.88 9.88a3 3 0 1 0 4.24 4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
      pwForm.querySelectorAll(".pw-toggle").forEach((btn) => {
        btn.addEventListener("click", () => {
          const input = document.getElementById(btn.dataset.toggle);
          if (!input) return;
          const showing = input.type === "text";
          input.type = showing ? "password" : "text";
          btn.innerHTML = showing ? EYE_OPEN_SVG : EYE_OFF_SVG;
          btn.setAttribute("aria-label", showing ? "Show password" : "Hide password");
          btn.setAttribute("title",      showing ? "Show password" : "Hide password");
        });
      });
      const pwMsg      = document.getElementById("pw-msg");

      // Check if we arrived here due to first-login gate (sessionStorage or URL param for backward compat).
      // Hide the "back to dashboard" link and show warning banner until password is updated.
      const isForceMode = sessionStorage.getItem('mustChangePassword') === 'true' ||
                          new URLSearchParams(location.search).get("force") === "1";
      if (isForceMode) {
        sessionStorage.removeItem('mustChangePassword');
      }

      let appDoc = null;

      signoutBtn.addEventListener("click", async () => {
        await signOut(auth);
        window.location.href = "/";
      });

      // ----- Change password -----
      pwForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        pwMsg.hidden = true;
        pwMsg.classList.remove("is-ok", "is-err");
        const data    = new FormData(pwForm);
        const current = data.get("current");
        const next    = data.get("next");
        const confirm = data.get("confirm");
        if (next !== confirm) {
          pwMsg.textContent = "New passwords don't match.";
          pwMsg.classList.add("is-err");
          pwMsg.hidden = false;
          return;
        }
        const user = auth.currentUser;
        if (!user) return;
        const submitBtn = pwForm.querySelector("button[type=submit]");
        submitBtn.disabled = true;
        try {
          const cred = EmailAuthProvider.credential(user.email, current);
          await reauthenticateWithCredential(user, cred);
          await updatePassword(user, next);

          // Clear the first-login flag so the dashboard unlocks.
          if (appDoc && appDoc.mustChangePassword) {
            try {
              await updateDoc(doc(db, "applications", appDoc.id), { mustChangePassword: false });
              appDoc.mustChangePassword = false;
            } catch (flagErr) {
              console.error("Could not clear mustChangePassword flag:", flagErr);
            }
          }

          pwForm.reset();
          pwMsg.textContent = "✓ Password updated.";
          pwMsg.classList.add("is-ok");
          pwMsg.hidden = false;

          if (isForceMode) {
            // Send them on to the real dashboard after a beat.
            setTimeout(() => { window.location.href = "menu"; }, 900);
          }
        } catch (err) {
          console.error(err);
          const code = err.code || "";
          let msg = "Could not update password.";
          if (code.includes("wrong-password") || code.includes("invalid-credential")) {
            msg = "Current password is incorrect.";
          } else if (code.includes("weak-password")) {
            msg = "New password is too weak (min 6 chars).";
          } else if (code.includes("too-many-requests")) {
            msg = "Too many attempts. Try again later.";
          }
          pwMsg.textContent = msg;
          pwMsg.classList.add("is-err");
          pwMsg.hidden = false;
        } finally {
          submitBtn.disabled = false;
        }
      });

      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          window.location.href = "index";
          return;
        }
        const isAdmin = ADMIN_EMAILS.includes((user.email || "").toLowerCase());

        // Redirect admins to the dedicated admin settings page
        if (isAdmin) {
          window.location.href = "settings-admin";
          return;
        }

        whoEmail.textContent = user.email;
        subtitle.textContent = "Manage your account.";
        view.hidden          = false;
        document.getElementById("pw-current")?.focus();

        try {
          const q = query(
            collection(db, "applications"),
            where("email", "==", (user.email || "").toLowerCase())
          );
          const snap = await getDocs(q);
          if (!snap.empty) {
            const d = snap.docs[0];
            appDoc = { id: d.id, ...d.data() };
          }
        } catch (err) {
          console.error("Could not load application doc:", err);
        }

        // Access gate: block only when application is in an explicitly
        // blocking state. Missing doc is treated as allowed.
        if (appDoc && (appDoc.status === "banned" || appDoc.status === "rejected" || appDoc.status === "pending")) {
          await signOut(auth);
          window.location.replace("index");
          return;
        }

        // Lock down the page in force-mode.
        if (isForceMode || (appDoc && appDoc.mustChangePassword)) {
          forceBanner.hidden  = false;
          const nav = document.getElementById("settings-nav");
          if (nav) nav.hidden = true;
        } else {
          mountNotificationBell({ user });
        }
      });
    </script>
  </body>
</html>
