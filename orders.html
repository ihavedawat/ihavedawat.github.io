<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dawat · My Orders</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&display=swap" />
    <link rel="stylesheet" href="style.css" />
    <meta name="view-transition" content="same-origin" />
  </head>
  <body class="admin-page">
    <div class="lights">
      <span class="bulb c1"></span><span class="bulb c2"></span><span class="bulb c3"></span><span class="bulb c4"></span><span class="bulb c5"></span>
      <span class="bulb c1"></span><span class="bulb c2"></span><span class="bulb c3"></span><span class="bulb c4"></span><span class="bulb c5"></span>
      <span class="bulb c1"></span><span class="bulb c2"></span><span class="bulb c3"></span><span class="bulb c4"></span><span class="bulb c5"></span>
    </div>

    <div class="top-fixed">
      <div class="brand">DAWAT</div>
      <div class="tagline">★ আপনার নিমন্ত্রণ ★</div>
    </div>

    <h1>My Orders</h1>
    <p id="orders-subtitle">Loading<span class="loading-dots"><span></span><span></span><span></span></span></p>

    <div class="admin-view" id="orders-view" hidden>
      <div class="admin-toolbar">
        <div class="admin-who">Signed in as <span id="who-email">—</span></div>
        <div class="toolbar-actions">
          <button type="button" id="signout-btn" class="ghost-btn">Sign out</button>
        </div>
      </div>

      <nav class="admin-nav">
        <a href="menu">Menu</a>
        <a href="orders" class="is-active">My Orders</a>
        <a href="wallet">Wallet</a>
        <a href="settings">Settings</a>
      </nav>

      <p class="wallet-bar">
        Wallet balance: <strong id="wallet-balance">—</strong>
        <a href="wallet" class="wallet-topup-link">+ Top-up</a>
      </p>

      <div id="orders-list" class="apps-list" aria-live="polite">
        <p class="apps-empty">Loading<span class="loading-dots"><span></span><span></span><span></span></span></p>
      </div>
    </div>

    <script type="module">
      import { auth, db } from "./firebase.js";
      import {
        onAuthStateChanged, signOut
      } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
      import {
        collection, query, where, onSnapshot,
        doc, updateDoc, serverTimestamp, getDocs, getDoc, runTransaction
      } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
      import { formatDateLabel, formatTk, pastCutoff, weekdayKey, show404 } from "./app-utils.js";
      import { mountNotificationBell, notifyAdmins } from "./notifications.js";
      import { confirmDialog, alertDialog } from "./modal.js";
      import { subscribeWallet, creditWallet, getBalance } from "./wallet.js";
      import { ADMIN_EMAILS } from "./admin-config.js";

      const subtitle = document.getElementById("orders-subtitle");
      const view     = document.getElementById("orders-view");
      const whoEmail = document.getElementById("who-email");
      const signoutBtn = document.getElementById("signout-btn");
      const listEl   = document.getElementById("orders-list");
      const walletBalanceEl = document.getElementById("wallet-balance");

      let ordersById  = {};
      let mealsById   = {};
      let currentName = "";
      let weekly      = {};
      let ordersPage  = 0;
      let visibleOrders = [];
      const ORDERS_PER_PAGE = 10;

      function escape(s) {
        return String(s ?? "").replace(/[&<>"']/g, (c) => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
        })[c]);
      }
      function dateFromKey(key) {
        const [y, m, d] = key.split("-").map(Number);
        return new Date(y, m - 1, d);
      }

      signoutBtn.addEventListener("click", async () => {
        await signOut(auth);
        window.location.href = "/";
      });

      function renderSummary(o) {
        return `
          <article class="app-card" data-order-id="${o.id}">
            <header class="app-card-head">
              <h3 class="app-card-name">${formatDateLabel(dateFromKey(o.forDate))}</h3>
              <div class="card-head-right">
                <span class="meal-price">${formatTk(o.total)}</span>
              </div>
            </header>
            <ul class="order-items">
              ${(o.items || []).map((it) =>
                `<li>${escape(it.name)} × ${it.qty} <span class="muted">· ${formatTk(it.price * it.qty)}</span></li>`
              ).join("")}
            </ul>
            ${pastCutoff(o.forDate)
              ? ''
              : `<div class="menu-day-foot toolbar-actions">
                   <button type="button" data-action="edit" data-order-id="${o.id}">Edit</button>
                   <button type="button" class="danger-btn" data-action="delete" data-order-id="${o.id}">Cancel order</button>
                   <span class="form-msg" hidden></span>
                 </div>`}
          </article>
        `;
      }

      function renderEdit(o) {
        // Pull the full menu for that weekday so the user can add meals
        // they didn't originally order, not just edit existing quantities.
        const dayMealIds = weekly[weekdayKey(dateFromKey(o.forDate))] || [];
        let menuMeals = dayMealIds.map((id) => mealsById[id]).filter(Boolean);
        // Include any meals that are on the order but no longer on the menu
        // (admin removed them) so user can still see/edit them.
        const onMenuIds = new Set(menuMeals.map((m) => m.id));
        (o.items || []).forEach((it) => {
          if (!onMenuIds.has(it.mealId)) {
            menuMeals.push({ id: it.mealId, name: it.name, price: Number(it.price || 0) });
          }
        });
        const qtyByMeal = {};
        (o.items || []).forEach((it) => { qtyByMeal[it.mealId] = Number(it.qty || 0); });

        const itemsHtml = menuMeals.map((m) => {
          const qty = qtyByMeal[m.id] || 0;
          return `
            <div class="menu-pick" data-meal-id="${m.id}" data-name="${escape(m.name)}" data-price="${Number(m.price || 0)}">
              <span class="menu-pick-name">${escape(m.name)}</span>
              <span class="menu-pick-price">${formatTk(m.price)}</span>
              <div class="qty-stepper ${qty > 0 ? "has-qty" : ""}">
                <button type="button" class="qty-btn" data-step="-1" aria-label="Decrease">−</button>
                <input type="number" min="0" max="20" step="1" value="${qty}" readonly class="qty-input" />
                <button type="button" class="qty-btn" data-step="1" aria-label="Increase">+</button>
              </div>
            </div>
          `;
        }).join("");
        return `
          <article class="app-card" data-order-id="${o.id}" data-mode="edit">
            <header class="app-card-head">
              <h3 class="app-card-name">${formatDateLabel(dateFromKey(o.forDate))}</h3>
              <div class="card-head-right">
                <span class="menu-day-key">Editing</span>
              </div>
            </header>
            <div class="menu-picks">${itemsHtml}</div>
            <div class="menu-day-foot toolbar-actions">
              <button type="button" data-action="save-edit" data-order-id="${o.id}">▶ Save</button>
              <button type="button" class="ghost-btn" data-action="cancel-edit" data-order-id="${o.id}">Cancel</button>
              <span class="form-msg" hidden></span>
            </div>
          </article>
        `;
      }

      function render(orders) {
        ordersById = {};
        const visible = orders.filter((o) => o.status !== "cancelled");
        if (!visible.length) {
          listEl.innerHTML = '<p class="apps-empty">No orders yet.</p>';
          return;
        }
        visible.sort((a, b) => (a.forDate < b.forDate ? 1 : -1));
        visible.forEach((o) => { ordersById[o.id] = o; });
        visibleOrders = visible;
        renderPage();
      }

      function renderPage() {
        const totalPages = Math.max(1, Math.ceil(visibleOrders.length / ORDERS_PER_PAGE));
        if (ordersPage >= totalPages) ordersPage = totalPages - 1;
        if (ordersPage < 0) ordersPage = 0;
        const start = ordersPage * ORDERS_PER_PAGE;
        const pageRows = visibleOrders.slice(start, start + ORDERS_PER_PAGE);
        const pager = visibleOrders.length > ORDERS_PER_PAGE
          ? `<div class="wallet-pager">
               <button type="button" class="ghost-btn" data-page="prev" ${ordersPage === 0 ? "disabled" : ""}>‹ Prev</button>
               <span class="muted">Page ${ordersPage + 1} of ${totalPages}</span>
               <button type="button" class="ghost-btn" data-page="next" ${ordersPage >= totalPages - 1 ? "disabled" : ""}>Next ›</button>
             </div>`
          : "";
        listEl.innerHTML = pageRows.map(renderSummary).join("") + pager;
      }

      listEl.addEventListener("click", async (e) => {
        const pageBtn = e.target.closest("button[data-page]");
        if (pageBtn) {
          if (pageBtn.dataset.page === "next") ordersPage++;
          else if (pageBtn.dataset.page === "prev") ordersPage = Math.max(0, ordersPage - 1);
          renderPage();
          return;
        }
        const stepBtn = e.target.closest(".qty-btn");
        if (stepBtn && !stepBtn.disabled) {
          const stepper = stepBtn.closest(".qty-stepper");
          const input   = stepper.querySelector(".qty-input");
          const step    = Number(stepBtn.dataset.step || 0);
          const next    = Math.min(20, Math.max(0, Number(input.value || 0) + step));
          input.value   = String(next);
          stepper.classList.toggle("has-qty", next > 0);
          return;
        }
        const editBtn = e.target.closest('[data-action="edit"]');
        if (editBtn) {
          const o = ordersById[editBtn.dataset.orderId];
          if (!o) return;
          const card = editBtn.closest(".app-card");
          card.outerHTML = renderEdit(o);
          return;
        }
        const cancelEditBtn = e.target.closest('[data-action="cancel-edit"]');
        if (cancelEditBtn) {
          const o = ordersById[cancelEditBtn.dataset.orderId];
          if (!o) return;
          const card = cancelEditBtn.closest(".app-card");
          card.outerHTML = renderSummary(o);
          return;
        }
        const saveBtn = e.target.closest('[data-action="save-edit"]');
        if (saveBtn) {
          const o    = ordersById[saveBtn.dataset.orderId];
          if (!o) return;
          const card = saveBtn.closest(".app-card");
          const msg  = card.querySelector(".form-msg");
          const picks = card.querySelectorAll(".menu-pick");
          const items = [];
          let total = 0;
          picks.forEach((p) => {
            const qty = Number(p.querySelector(".qty-input").value || 0);
            if (qty > 0) {
              const price = Number(p.dataset.price || 0);
              items.push({ mealId: p.dataset.mealId, name: p.dataset.name, price, qty });
              total += price * qty;
            }
          });
          msg.hidden = true; msg.classList.remove("is-ok", "is-err");
          if (!items.length) {
            msg.textContent = "Pick at least one meal, or delete the order.";
            msg.classList.add("is-err"); msg.hidden = false;
            return;
          }
          const prevTotal = Number(o.total || 0);
          const diff = total - prevTotal;
          if (diff > 0) {
            const currentBalance = Number(walletBalanceEl.textContent.replace(/\D/g, "") || 0);
            if (currentBalance < diff) {
              msg.textContent = "Not enough balance. Top-up " + formatTk(diff - currentBalance) + " more.";
              msg.classList.add("is-err"); msg.hidden = false;
              return;
            }
          }
          saveBtn.disabled = true;
          try {
            const prevKey = (o.items || [])
              .slice()
              .sort((a, b) => String(a.mealId).localeCompare(String(b.mealId)))
              .map((it) => it.mealId + ":" + Number(it.qty || 0))
              .join("|");
            const newKey = items
              .slice()
              .sort((a, b) => String(a.mealId).localeCompare(String(b.mealId)))
              .map((it) => it.mealId + ":" + Number(it.qty || 0))
              .join("|");
            if (newKey === prevKey && total === prevTotal) {
              // No actual change — just close the editor without writing or notifying.
              card.outerHTML = renderSummary(o);
              return;
            }
            const email = (o.userEmail || "").toLowerCase();
            await updateDoc(doc(db, "orders", o.id), {
              items, total, updatedAt: serverTimestamp()
            });
            const diff = total - prevTotal;
            console.log("Order edit: prevTotal =", prevTotal, "total =", total, "diff =", diff);
            
            // If price changed, update wallet and history
            if (diff !== 0) {
              console.log("Price changed by", diff, "- updating wallet");
              try {
                // Find and update the existing walletHistory entry
                const histSnap = await getDocs(
                  query(collection(db, "walletHistory"), 
                    where("userId", "==", auth.currentUser.uid),
                    where("ref", "==", o.id))
                );
                if (histSnap.empty) {
                  console.error("Could not find wallet history entry for order", o.id);
                  return;
                }
                const histDocId = histSnap.docs[0].id;
                const histData = histSnap.docs[0].data();
                const oldDebitAmount = histData.amount; // This is negative (e.g., -500)
                const newDebitAmount = -total; // New debit (e.g., -300 if decreased, -700 if increased)
                
                // Update wallet balance and history in a transaction
                await runTransaction(db, async (tx) => {
                  const walletRef = doc(db, "wallets", auth.currentUser.uid);
                  const wSnap = await tx.get(walletRef);
                  const currentBalance = wSnap.exists() ? Number(wSnap.data().balance || 0) : 0;
                  const newBalance = currentBalance - diff; // subtract diff (if diff is negative, balance increases; if positive, decreases)
                  
                  console.log("Transaction: current balance =", currentBalance, "diff =", diff, "new balance =", newBalance);
                  
                  // Update wallet
                  tx.update(walletRef, {
                    balance: newBalance,
                    updatedAt: serverTimestamp()
                  });
                  
                  // Update walletHistory entry
                  tx.update(doc(db, "walletHistory", histDocId), {
                    amount: newDebitAmount,
                    balanceAfter: newBalance,
                    note: "Order (edited) for " + o.forDate,
                    updatedAt: serverTimestamp()
                  });
                });
                
                console.log("Wallet and history updated successfully");
              } catch (walletErr) {
                console.error("Wallet update failed:", walletErr);
              }
            } else {
              console.log("No price change");
            }
            const diffLabel = diff === 0
              ? "no price change"
              : (diff > 0 ? "+" : "") + formatTk(diff);
            // Build per-meal diff so admin sees exactly what moved.
            const prevQtyById = {};
            (o.items || []).forEach((it) => { prevQtyById[it.mealId] = Number(it.qty || 0); });
            const newQtyById = {};
            items.forEach((it) => { newQtyById[it.mealId] = Number(it.qty || 0); });
            const nameById = {};
            (o.items || []).forEach((it) => { nameById[it.mealId] = it.name; });
            items.forEach((it) => { nameById[it.mealId] = it.name; });
            const priceById = {};
            (o.items || []).forEach((it) => { priceById[it.mealId] = Number(it.price || 0); });
            items.forEach((it) => { priceById[it.mealId] = Number(it.price || 0); });

            // Lines for the updated order, with markers showing what moved.
            //   •          unchanged item
            //   + (new)    newly added item
            //   ~ a→b      quantity changed
            // Removed items are appended after the updated list with a − marker.
            const lines = [];
            items.forEach((it) => {
              const before = prevQtyById[it.mealId] || 0;
              const after  = it.qty;
              const priceLabel = formatTk(it.price * it.qty);
              if (before === 0) {
                lines.push("  + " + it.name + " ×" + after + " — " + priceLabel + "  (new)");
              } else if (before !== after) {
                lines.push("  ~ " + it.name + " ×" + before + "→×" + after + " — " + priceLabel);
              } else {
                lines.push("  • " + it.name + " ×" + after + " — " + priceLabel);
              }
            });
            Object.keys(prevQtyById).forEach((id) => {
              if (!(id in newQtyById) || newQtyById[id] === 0) {
                const before = prevQtyById[id];
                if (before > 0) {
                  const refund = formatTk(before * (priceById[id] || 0));
                  lines.push("  − " + (nameById[id] || id) + " ×" + before + " — " + refund + "  (removed)");
                }
              }
            });
            const itemList = lines.join("\n");
            const dateLabel = formatDateLabel(dateFromKey(o.forDate));
            const byLabel = currentName ? currentName + " (" + email + ")" : email;
            notifyAdmins({
              message:
                "Order edited — " + dateLabel + "\n" +
                "By: " + byLabel + "\n" +
                itemList + "\n" +
                "Total: " + formatTk(total) + " (" + diffLabel + ")",
              link: "orders-admin",
              linkText: "View orders",
              type: "order-edited"
            }).catch((e) => console.error("notify admin:", e));
          } catch (err) {
            console.error(err);
            saveBtn.disabled = false;
            msg.textContent = "Could not save changes.";
            msg.classList.add("is-err"); msg.hidden = false;
          }
          return;
        }
        const delBtn = e.target.closest('[data-action="delete"]');
        if (delBtn) {
          const ok = await confirmDialog({
            title: "Cancel order",
            message: "Cancel this order?",
            confirmLabel: "Cancel order",
            cancelLabel: "Keep order",
            danger: true
          });
          if (!ok) return;
          delBtn.disabled = true;
          const cancelledOrder = ordersById[delBtn.dataset.orderId];
          const email = cancelledOrder ? (cancelledOrder.userEmail || "").toLowerCase() : "";
          try {
            await updateDoc(doc(db, "orders", delBtn.dataset.orderId), {
              status:      "cancelled",
              cancelledAt: serverTimestamp()
            });
            // Refund the order total to wallet
            if (cancelledOrder && cancelledOrder.total) {
              console.log("Cancelling order, refunding:", cancelledOrder.total);
              try {
                // Create a NEW walletHistory entry for the cancellation refund
                await runTransaction(db, async (tx) => {
                  const walletRef = doc(db, "wallets", auth.currentUser.uid);
                  const wSnap = await tx.get(walletRef);
                  const currentBalance = wSnap.exists() ? Number(wSnap.data().balance || 0) : 0;
                  const newBalance = currentBalance + Number(cancelledOrder.total);
                  
                  console.log("Cancel transaction: current balance =", currentBalance, "refund =", cancelledOrder.total, "new balance =", newBalance);
                  
                  // Update wallet
                  tx.update(walletRef, {
                    balance: newBalance,
                    updatedAt: serverTimestamp()
                  });
                  
                  // Create NEW walletHistory entry for the cancellation
                  const txnRef = doc(collection(db, "walletHistory"));
                  tx.set(txnRef, {
                    userId: auth.currentUser.uid,
                    userEmail: email,
                    type: "order_refund",
                    amount: Number(cancelledOrder.total),
                    balanceAfter: newBalance,
                    ref: cancelledOrder.id,
                    note: "Order (cancelled) for " + cancelledOrder.forDate,
                    createdAt: serverTimestamp()
                  });
                });
                
                console.log("Cancel refund completed successfully");
              } catch (walletErr) {
                console.error("Wallet refund failed:", walletErr);
              }
            }
            if (cancelledOrder) {
              const itemList = (cancelledOrder.items || []).map((it) => "  • " + it.name + " ×" + it.qty + " — " + formatTk(it.price * it.qty)).join("\n");
              const dateLabel = formatDateLabel(dateFromKey(cancelledOrder.forDate));
              const byLabel = currentName ? currentName + " (" + email + ")" : email;
              notifyAdmins({
                message:
                  "Order cancelled — " + dateLabel + "\n" +
                  "By: " + byLabel + "\n" +
                  itemList + "\n" +
                  "Refund: " + formatTk(Number(cancelledOrder.total || 0)),
                link: "orders-admin",
                linkText: "View orders",
                type: "order-cancelled"
              }).catch((e) => console.error("notify admin:", e));
            }
          } catch (err) {
            console.error(err);
            delBtn.disabled = false;
            alertDialog({ title: "Error", message: "Could not cancel." });
          }
        }
      });

      onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.replace("/"); return; }
        if (ADMIN_EMAILS.includes((user.email || "").toLowerCase())) {
          await show404(); return;
        }

        // Access gate: block only when application is in an explicitly
        // blocking state. Missing doc is treated as allowed.
        try {
          const aq    = query(collection(db, "applications"), where("email", "==", user.email.toLowerCase()));
          const aSnap = await getDocs(aq);
          const appData = aSnap.empty ? null : aSnap.docs[0].data();
          if (appData && appData.name) currentName = appData.name;
          if (appData && (appData.status === "banned" || appData.status === "rejected" || appData.status === "pending")) {
            await signOut(auth);
            window.location.replace("/");
            return;
          }
          if (appData && appData.mustChangePassword) {
            sessionStorage.setItem('mustChangePassword', 'true');
            window.location.replace("settings");
            return;
          }
        } catch (err) {
          console.error("Access check failed:", err);
        }

        whoEmail.textContent = user.email;
        subtitle.textContent = "Your placed orders.";
        view.hidden = false;
        mountNotificationBell({ user });

        // Subscribe to wallet balance (non-blocking)
        subscribeWallet(user.uid, (bal) => { 
          console.log("Wallet balance updated to:", bal);
          if (walletBalanceEl) walletBalanceEl.textContent = formatTk(bal); 
        });

        // Preload meals + weekly menu so Edit can show full options.
        try {
          const [mealsSnap, weeklySnap] = await Promise.all([
            getDocs(collection(db, "meals")),
            getDoc(doc(db, "weeklyMenu", "main"))
          ]);
          mealsById = {};
          mealsSnap.docs.forEach((d) => { mealsById[d.id] = { id: d.id, ...d.data() }; });
          weekly = weeklySnap.exists() ? (weeklySnap.data() || {}) : {};
        } catch (err) {
          console.error("Could not preload menu", err);
        }

        onSnapshot(
          query(collection(db, "orders"), where("userEmail", "==", user.email.toLowerCase())),
          (snap) => {
            const items = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
            render(items);
          },
          (err) => {
            console.error(err);
            listEl.innerHTML = '<p class="apps-empty is-err">Could not load orders.</p>';
          }
        );
      });
    </script>
  </body>
</html>
