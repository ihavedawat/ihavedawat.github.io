<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dawat · Sign In</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&display=swap" />
    <link rel="stylesheet" href="css/style.css" />
    <meta name="view-transition" content="same-origin" />
  </head>
  <body class="login-page">
    <div class="starfield" aria-hidden="true">
      <span class="star-layer s-small"></span>
      <span class="star-layer s-big"></span>
    </div>

    <div class="shooting-stars" aria-hidden="true">
      <span class="shoot s1"></span>
      <span class="shoot s2"></span>
      <span class="shoot s3"></span>
    </div>

    <div class="lights">
      <span class="bulb c1"></span><span class="bulb c2"></span><span class="bulb c3"></span><span class="bulb c4"></span><span class="bulb c5"></span>
      <span class="bulb c1"></span><span class="bulb c2"></span><span class="bulb c3"></span><span class="bulb c4"></span><span class="bulb c5"></span>
      <span class="bulb c1"></span><span class="bulb c2"></span><span class="bulb c3"></span><span class="bulb c4"></span><span class="bulb c5"></span>
    </div>

    <div class="top-fixed">
      <div class="brand">DAWAT</div>
      <div class="tagline">★ আপনার নিমন্ত্রণ ★</div>
    </div>

    <h1>Sign In</h1>
    <p>Enter your Dawat credentials to continue.</p>

    <div class="form-wrap">
      <form id="login-form">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="username" autofocus required />

        <label for="password">Password</label>
        <div class="pw-input">
          <input id="password" type="password" autocomplete="current-password" required />
          <button type="button" class="pw-btn pw-toggle" id="pw-toggle" tabindex="-1" aria-label="Show password" title="Show password">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>

        <button type="submit">▶ Sign In</button>
        <div id="login-status" class="apply-status" role="status" aria-live="polite"></div>
        <p class="form-foot">
          Not invited yet? <a href="apply">Apply for an account</a>.
        </p>
      </form>
    </div>

    <script src="js/stars.js"></script>

    <script>
      const host = window.location.hostname;
      if (host === 'igotdawat.github.io') {
        window.location.href = 'https://igotdawat.vercel.app/';
      } else if (host === 'ihavedawat.github.io') {
        window.location.href = 'https://ihavedawat.vercel.app/';
      }
    </script>

    <script type="module">
      import { auth } from "./js/firebase.js";
      import {
        signInWithEmailAndPassword,
        onAuthStateChanged,
        signOut
      } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

      // Admin emails should never end up on the customer dashboard — bounce
      // them to applications.html instead. Keep this list in sync with admin-view.js.
      import { ADMIN_EMAILS } from "./js/admin-config.js";

      const form   = document.getElementById("login-form");
      const status = document.getElementById("login-status");
      const button = form.querySelector("button[type=submit]");

      // Password show/hide toggle.
      const pwInput   = document.getElementById("password");
      const pwToggle  = document.getElementById("pw-toggle");
      const EYE_OPEN  = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>';
      const EYE_OFF   = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a19.77 19.77 0 0 1 5.06-5.94M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 7 11 7a19.85 19.85 0 0 1-3.17 4.19M9.88 9.88a3 3 0 1 0 4.24 4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
      pwToggle.addEventListener("click", () => {
        const showing = pwInput.type === "text";
        pwInput.type = showing ? "password" : "text";
        pwToggle.innerHTML = showing ? EYE_OPEN : EYE_OFF;
        pwToggle.setAttribute("aria-label", showing ? "Show password" : "Hide password");
        pwToggle.setAttribute("title",      showing ? "Show password" : "Hide password");
      });

      // If already signed in, route based on role.
      onAuthStateChanged(auth, (user) => {
        if (!user) return;
        const target = ADMIN_EMAILS.includes((user.email || "").toLowerCase()) ? "applications.html" : "menu.html";
        window.location.href = target;
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        status.textContent = "";
        status.className   = "apply-status";
        button.disabled    = true;
        button.innerHTML   = '▶ Signing in<span class="loading-dots"><span></span><span></span><span></span></span>';

        const email    = document.getElementById("email").value.trim().toLowerCase();
        const password = document.getElementById("password").value;

        try {
          await signInWithEmailAndPassword(auth, email, password);
          // onAuthStateChanged will redirect.
        } catch (err) {
          console.error(err);
          status.textContent = "⚠ Wrong email or password.";
          status.classList.add("is-error");
          button.disabled    = false;
          button.textContent = "▶ Sign In";
        }
      });
    </script>
  </body>
</html>
