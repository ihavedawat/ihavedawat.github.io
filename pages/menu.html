<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dawat · Menu</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&display=swap" />
    <link rel="stylesheet" href="../css/style.css" />
    <meta name="view-transition" content="same-origin" />
  </head>
  <body class="admin-page">
    <div class="lights">
      <span class="bulb c1"></span><span class="bulb c2"></span><span class="bulb c3"></span><span class="bulb c4"></span><span class="bulb c5"></span>
      <span class="bulb c1"></span><span class="bulb c2"></span><span class="bulb c3"></span><span class="bulb c4"></span><span class="bulb c5"></span>
      <span class="bulb c1"></span><span class="bulb c2"></span><span class="bulb c3"></span><span class="bulb c4"></span><span class="bulb c5"></span>
    </div>

    <div class="top-fixed">
      <div class="brand">DAWAT</div>
      <div class="tagline">★ আপনার নিমন্ত্রণ ★</div>
    </div>

    <h1>Menu</h1>
    <p id="dash-subtitle">Loading<span class="loading-dots"><span></span><span></span><span></span></span></p>

    <div class="admin-view" id="dash-view" hidden>
      <div class="admin-toolbar">
        <div class="admin-who">
          Signed in as <span id="who-email">—</span>
        </div>
        <div class="toolbar-actions">
          <button type="button" id="signout-btn" class="ghost-btn">Sign out</button>
        </div>
      </div>

      <nav class="admin-nav">
        <a href="menu" class="is-active">Menu</a>
        <a href="orders">My Orders</a>
        <a href="wallet">Wallet</a>
        <a href="settings">Settings</a>
      </nav>

      <p class="help-text" id="help-text">
        Order for <strong>tomorrow</strong>. Closes <strong>—</strong>.
      </p>

      <p class="wallet-bar">
        Wallet balance: <strong id="wallet-balance">—</strong>
        <a href="wallet" class="wallet-topup-link">+ Top-up</a>
      </p>

      <div id="days" class="menu-days">
        <p class="apps-empty">Loading<span class="loading-dots"><span></span><span></span><span></span></span></p>
      </div>
    </div>

    <script type="module">
      import { auth, db } from "./js/firebase.js";
      import {
        onAuthStateChanged,
        signOut
      } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
      import {
        collection, query, where, getDocs, getDoc, doc,
        addDoc, updateDoc, onSnapshot, serverTimestamp
      } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
      import { nextNDates, toDateKey, formatDateLabel, formatTk, orderingClosed, pastCutoff, weekdayKey, nextOrderingOpen, formatNextOpenLabel, formatTodaysCloseTime, show404 } from "./js/app-utils.js";
      import { subscribeWallet } from "./js/wallet.js";
      import { secureDebitForOrder } from "./js/wallet-secure.js";
      import { mountNotificationBell, notifyAdmins } from "./js/notifications.js";
      import { confirmDialog, alertDialog } from "./js/modal.js";
      import { ADMIN_EMAILS } from "./js/admin-config.js";
      import { escape } from "./js/admin-helpers.js";

      const subtitle   = document.getElementById("dash-subtitle");
      const dashView   = document.getElementById("dash-view");
      const whoEmail   = document.getElementById("who-email");
      const signoutBtn = document.getElementById("signout-btn");

      signoutBtn.addEventListener("click", async () => {
        await signOut(auth);
        window.location.href = "/";
      });

      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          window.location.href = "/";
          return;
        }
        if (ADMIN_EMAILS.includes((user.email || "").toLowerCase())) {
          await show404();
          return;
        }

        // First-login gate: if the user is still on the admin-issued
        // temporary password, force them to Settings to change it before
        // they can see the dashboard. Also gate access to the page
        // entirely: anyone whose application isn't approved + creds-sent
        // gets bounced (covers banned / deleted / re-pending users).
        try {
          const q = query(
            collection(db, "applications"),
            where("email", "==", (user.email || "").toLowerCase())
          );
          const snap = await getDocs(q);
          const appData = snap.empty ? null : snap.docs[0].data();
          if (appData && appData.name) currentName = appData.name;
          // Only kick out users whose application is explicitly in a
          // blocking state. A missing doc is fine (legacy / manual
          // cleanup) — the Auth account is enough to keep using the app.
          if (appData && (appData.status === "banned" || appData.status === "rejected" || appData.status === "pending")) {
            await signOut(auth);
            window.location.replace("/");
            return;
          }
          if (appData && appData.mustChangePassword) {
            sessionStorage.setItem('mustChangePassword', 'true');
            window.location.replace("settings.html");
            return;
          }
        } catch (err) {
          console.error("Could not load application doc:", err);
        }

        whoEmail.textContent = user.email;
        subtitle.textContent = "Choose your meals for tomorrow.";
        dashView.hidden      = false;
        mountNotificationBell({ user });

        await loadDays(user);
      });

      // ----- Ordering flow -----
      const daysEl = document.getElementById("days");

      // Existing-orders cache (so we can re-render fast).
      let existingByDate = {};   // dateKey -> order object (live, non-cancelled)
      let mealsById      = {};
      let weekly         = {};   // { sat: [mealIds], sun: [...], ... }
      let currentUser    = null;
      let currentName    = "";
      let walletBalance  = 0;
      const walletBalanceEl = document.getElementById("wallet-balance");

      async function loadDays(user) {
        currentUser = user;

        // Live wallet balance — powers the header pill and the
        // Place-Order affordability check.
        subscribeWallet(user.uid, (bal) => {
          walletBalance = bal;
          if (walletBalanceEl) walletBalanceEl.textContent = formatTk(bal);
          // Re-render so the Place Order button reflects new affordability.
          if (Object.keys(mealsById).length) render();
        });

        // Load full meal catalog (we look meals up by id when rendering an order).
        const mealsSnap = await getDocs(collection(db, "meals"));
        mealsById = {};
        mealsSnap.docs.forEach((d) => { mealsById[d.id] = { id: d.id, ...d.data() }; });

        // Load the single weekly menu doc.
        const wkSnap = await getDoc(doc(db, "weeklyMenu", "main"));
        weekly = wkSnap.exists() ? (wkSnap.data() || {}) : {};

        // Live-subscribe to this user's orders so the UI reflects placements/cancels in real time.
        onSnapshot(
          query(collection(db, "orders"), where("userEmail", "==", user.email.toLowerCase())),
          (snap) => {
            existingByDate = {};
            snap.docs.forEach((d) => {
              const o = { id: d.id, ...d.data() };
              if (o.status !== "cancelled") existingByDate[o.forDate] = o;
            });
            render();
          },
          (err) => console.error("orders subscription error:", err)
        );
      }

      function render() {
        // Customers only ever order for tomorrow — today's window has
        // already closed, and anything beyond tomorrow is too far out.
        const dates = nextNDates(2).slice(1);
        const reopenLabel = formatNextOpenLabel(nextOrderingOpen());
        const closedMsg   = "Closed. Opens " + reopenLabel + ".";
        // Swap the top banner depending on whether the window is open.
        const anyOpen = dates.some((d) => !orderingClosed(toDateKey(d)));
        const helpEl = document.getElementById("help-text");
        if (helpEl) {
          helpEl.innerHTML = anyOpen
            ? "Order for <strong>tomorrow</strong>. Closes <strong>" + formatTodaysCloseTime() + "</strong>."
            : "Closed. Opens <strong>" + reopenLabel + "</strong>.";
        }
        daysEl.innerHTML = dates.map((d) => {
          const key       = toDateKey(d);
          const closed    = orderingClosed(key);
          const locked    = pastCutoff(key);
          const dayMealIds= weekly[weekdayKey(d)] || [];
          const existing  = existingByDate[key];
          const mealsForDay = dayMealIds
            .map((id) => mealsById[id])
            .filter(Boolean);

          if (existing) {
            // Show placed order summary.
            return `
              <section class="menu-day" data-date-key="${key}">
                <header class="menu-day-head">
                  <h3><span class="menu-day-tag">Tomorrow</span> · ${formatDateLabel(d)}</h3>
                  ${locked
                    ? '<span class="card-status status-locked">Locked</span>'
                    : '<span class="status-chip is-approved">Order placed</span>'}
                </header>
                <ul class="order-items">
                  ${(existing.items || []).map((it) =>
                    `<li>${escape(it.name)} × ${it.qty} <span class="muted">· ${formatTk(it.price * it.qty)}</span></li>`
                  ).join("")}
                </ul>
                <div class="menu-day-foot">
                  <strong>Total: ${formatTk(existing.total)}</strong>
                </div>
              </section>
            `;
          }

          if (!mealsForDay.length) {
            return `
              <section class="menu-day is-empty${closed ? " is-locked" : ""}" data-date-key="${key}">
                <header class="menu-day-head">
                  <h3><span class="menu-day-tag">Tomorrow</span> · ${formatDateLabel(d)}</h3>
                  ${closed ? '<span class="card-status status-locked">Locked</span>' : ''}
                </header>
                <p class="muted" style="margin: 4px 0 0;">${closed ? "" : "Check back soon — menu not posted yet."}</p>
              </section>
            `;
          }

          // Show meal list with qty inputs.
          const itemsHtml = mealsForDay.map((m) => `
            <div class="menu-pick">
              <span class="menu-pick-name">${escape(m.name)}</span>
              ${m.description ? `<span class="menu-pick-desc">${escape(m.description)}</span>` : ''}
              <span class="menu-pick-price">${formatTk(m.price)}</span>
              <div class="qty-stepper">
                <button type="button" class="qty-btn" data-step="-1" aria-label="Decrease" ${closed ? "disabled" : ""}>−</button>
                <input type="number" min="0" max="20" step="1" value="0" readonly
                       class="qty-input" data-meal-id="${m.id}" ${closed ? "disabled" : ""} />
                <button type="button" class="qty-btn" data-step="1" aria-label="Increase" ${closed ? "disabled" : ""}>+</button>
              </div>
            </div>
          `).join("");
          return `
            <section class="menu-day${closed ? " is-locked" : ""}" data-date-key="${key}">
              <header class="menu-day-head">
                <h3><span class="menu-day-tag">Tomorrow</span> · ${formatDateLabel(d)}</h3>
                ${closed ? '<span class="card-status status-locked">Locked</span>' : ''}
              </header>
              <div class="menu-picks">${itemsHtml}</div>
              ${closed ? '' : `
              <div class="menu-day-foot">
                <button type="button" data-action="place-order">▶ Place order</button>
                <span class="menu-day-msg form-msg" hidden></span>
              </div>`}
            </section>
          `;
        }).join("");
      }

      daysEl.addEventListener("click", async (e) => {
        const stepBtn = e.target.closest(".qty-btn");
        if (stepBtn && !stepBtn.disabled) {
          const stepper = stepBtn.closest(".qty-stepper");
          const input   = stepper.querySelector(".qty-input");
          const step    = Number(stepBtn.dataset.step || 0);
          const min     = Number(input.min || 0);
          const max     = Number(input.max || 20);
          const next    = Math.min(max, Math.max(min, Number(input.value || 0) + step));
          input.value   = String(next);
          stepper.classList.toggle("has-qty", next > 0);
          return;
        }
        const placeBtn = e.target.closest('[data-action="place-order"]');
        if (placeBtn) {
          const section = placeBtn.closest(".menu-day");
          const key     = section.dataset.dateKey;
          if (orderingClosed(key)) return;
          const inputs  = section.querySelectorAll(".qty-input");
          const items   = [];
          let total = 0;
          inputs.forEach((inp) => {
            const qty = Number(inp.value || 0);
            if (qty > 0) {
              const m = mealsById[inp.dataset.mealId];
              if (m) {
                items.push({ mealId: m.id, name: m.name, price: Number(m.price || 0), qty });
                total += Number(m.price || 0) * qty;
              }
            }
          });
          const msgEl = section.querySelector(".menu-day-msg");
          msgEl.hidden = true; msgEl.classList.remove("is-ok", "is-err");
          if (!items.length) {
            msgEl.textContent = "Pick at least one meal.";
            msgEl.classList.add("is-err"); msgEl.hidden = false;
            return;
          }
          if (walletBalance < total) {
            msgEl.textContent = "Not enough balance. Top-up " + formatTk(total - walletBalance) + " more.";
            msgEl.classList.add("is-err"); msgEl.hidden = false;
            return;
          }
          placeBtn.disabled = true;
          try {
            // Create the order first so we have an id for the wallet txn,
            // then debit. If the debit fails (race / insufficient funds),
            // cancel the order to keep things consistent.
            const orderRef = await addDoc(collection(db, "orders"), {
              userEmail:  currentUser.email.toLowerCase(),
              userId:     currentUser.uid,
              forDate:    key,
              items, total,
              status:     "placed",
              paid:       true,
              createdAt:  serverTimestamp()
            });
            try {
              await secureDebitForOrder({
                userId: currentUser.uid,
                userEmail: currentUser.email.toLowerCase(),
                amount: total,
                orderId: orderRef.id,
                note: "Order for " + key
              });
            } catch (debitErr) {
              await updateDoc(orderRef, { status: "cancelled", cancelledAt: serverTimestamp(), cancelReason: "debit_failed" });
              throw debitErr;
            }
            const [_dy, _dm, _dd] = key.split("-").map(Number);
            const dateLabel = formatDateLabel(new Date(_dy, _dm - 1, _dd));
            const itemList = items.map((it) => "  • " + it.name + " ×" + it.qty + " — " + formatTk(it.price * it.qty)).join("\n");
            const byLabel = currentName
              ? currentName + " (" + currentUser.email.toLowerCase() + ")"
              : currentUser.email.toLowerCase();
            notifyAdmins({
              message:
                "New order — " + dateLabel + "\n" +
                "By: " + byLabel + "\n" +
                itemList + "\n" +
                "Total: " + formatTk(total),
              link: "orders-admin",
              linkText: "View orders",
              type: "order-placed"
            }).catch((e) => console.error("notify admin:", e));
            // The onSnapshot listener will re-render with the summary view.
          } catch (err) {
            console.error(err);
            placeBtn.disabled = false;
            msgEl.textContent = err.message === "INSUFFICIENT_FUNDS"
              ? "Not enough balance."
              : "Could not place order.";
            msgEl.classList.add("is-err"); msgEl.hidden = false;
          }
          return;
        }
        const cancelBtn = e.target.closest('[data-action="cancel"]');
        if (cancelBtn) {
          const section = cancelBtn.closest(".menu-day");
          const key     = section.dataset.dateKey;
          if (orderingClosed(key)) return;
          const ok = await confirmDialog({
            title: "Cancel order",
            message: "Cancel this order?",
            confirmLabel: "Cancel order",
            cancelLabel: "Keep order",
            danger: true
          });
          if (!ok) return;
          cancelBtn.disabled = true;
          const cancelledOrder = existingByDate[key];
          try {
            await updateDoc(doc(db, "orders", cancelBtn.dataset.orderId), {
              status:      "cancelled",
              cancelledAt: serverTimestamp()
            });
            if (cancelledOrder) {
              const [_cy, _cm, _cd] = key.split("-").map(Number);
              const dateLabel = formatDateLabel(new Date(_cy, _cm - 1, _cd));
              const itemList = (cancelledOrder.items || []).map((it) => "  • " + it.name + " ×" + it.qty + " — " + formatTk(it.price * it.qty)).join("\n");
              const byLabel = currentName
                ? currentName + " (" + currentUser.email.toLowerCase() + ")"
                : currentUser.email.toLowerCase();
              notifyAdmins({
                message:
                  "Order cancelled — " + dateLabel + "\n" +
                  "By: " + byLabel + "\n" +
                  itemList + "\n" +
                  "Refund: " + formatTk(Number(cancelledOrder.total || 0)),
                link: "orders-admin",
                linkText: "View orders",
                type: "order-cancelled"
              }).catch((e) => console.error("notify admin:", e));
            }
          } catch (err) {
            console.error(err);
            cancelBtn.disabled = false;
            alertDialog({ title: "Error", message: "Could not cancel." });
          }
        }
      });
    </script>
  </body>
</html>
