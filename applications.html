<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dawat · Applications</title>
    <script>if(window.self===window.top){const h=window.location.hostname;let v=null;if(h==="igotdawat.github.io")v="igotdawat.vercel.app";else if(h==="ihavedawat.github.io")v="ihavedawat.vercel.app";if(v){const p=window.location.pathname,s=window.location.search,hh=window.location.hash;window.location.href=`https://${v}${p}${s}${hh}`;}};</script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&display=swap" />
    <link rel="stylesheet" href="./css/style.css" />
    <meta name="view-transition" content="same-origin" />
  </head>
  <body class="admin-page" data-group="applications">
    <div class="lights">
      <span class="bulb c1"></span><span class="bulb c2"></span><span class="bulb c3"></span><span class="bulb c4"></span><span class="bulb c5"></span>
      <span class="bulb c1"></span><span class="bulb c2"></span><span class="bulb c3"></span><span class="bulb c4"></span><span class="bulb c5"></span>
      <span class="bulb c1"></span><span class="bulb c2"></span><span class="bulb c3"></span><span class="bulb c4"></span><span class="bulb c5"></span>
    </div>

    <div class="top-fixed">
      <div class="brand">DAWAT</div>
      <div class="tagline">★ আপনার নিমন্ত্রণ ★</div>
    </div>

    <h1>Applications</h1>
    <p id="admin-subtitle">Loading<span class="loading-dots"><span></span><span></span><span></span></span></p>

    <div class="admin-view" id="apps-view" hidden>
      <div class="admin-toolbar">
        <div class="admin-who">Signed in as <span id="admin-who-email">—</span></div>
        <div class="toolbar-actions">
          <button type="button" id="signout-btn" class="ghost-btn">Sign out</button>
        </div>
      </div>

      <nav class="admin-nav">
        <a href="applications" class="is-active">Applications</a>
        <a href="users">Users</a>
        <a href="meals">Meals</a>
        <a href="menu-admin">Menu</a>
        <a href="orders-admin">Orders</a>
        <a href="topups-admin">Top-ups</a>
        <a href="settings-admin">Settings</a>
      </nav>

      <div class="filter-pills" role="tablist" aria-label="Filter applications">
        <button type="button" class="pill is-active" data-filter="pending"  role="tab" aria-selected="true"></button>
        <button type="button" class="pill"           data-filter="approved" role="tab" aria-selected="false"></button>
        <button type="button" class="pill"           data-filter="rejected" role="tab" aria-selected="false"></button>
        <span class="pills-spacer"></span>
        <button type="button" id="clear-all-btn" class="danger-btn" hidden>Clear all</button>
      </div>

      <div id="apps-list" class="apps-list" aria-live="polite">
        <p class="apps-empty">Loading<span class="loading-dots"><span></span><span></span><span></span></span></p>
      </div>
    </div>

    <script src="../js/stars.js"></script>
    <script type="module" src="../js/admin-view.js"></script>
  </body>
</html>
